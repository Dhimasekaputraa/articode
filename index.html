<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtiCode</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <nav class="topnav">
        <a>ArtiCode</a>
            <div class="topnav-right">
                <a href="#">Manual</a>
                <a href="https://github.com/Dhimasekaputraa/articode.git" target="_blank">Github</a>
            </div> 
    </nav>

    <!-- Title -->
    <div class="hero-section">
        <h1>Arithmetic Coding</h1>
        <p class="sub-title">Convert string into interval</p>
    </div>
    
    <!-- Input -->
    <div class="input-section">
        <input type="text" id="userInput" placeholder="Insert your text here...">
        <button class="action-button" onclick="solveArithmetic()">Encode</button>
    </div>

    <!-- Output -->
    <div class="output-section" id="outputSection">
        <h3>Probability Table</h3>
        <div id="probabilityTable"></div>

        <h3>Iteration Process</h3>
        <div id="iterationLog"></div>

        <h3>Final Result</h3>
        <div id="finalResult"></div>

    </div>
    <script src="script.js"></script>
</body>
</html>

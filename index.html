<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtiCode</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <nav>
        <ul>
            <li><a>ArtiCode</a></li>
            <li><a>Github</a></li>
        </ul>
    </nav>
    <!-- Title -->
    <h1>Arithmetic Code Encoder</h1>

    <!-- Input -->
    <input type="text" id="userInput" placeholder="Insert your text here">
    <button onclick="solveArithmetic()">Encode</button>

    <hr>

    <!-- Output -->
    <h3>Probability Table</h3>
    <div id="probabilityTable"></div>

    <h3>Iteration Process</h3>
    <div id="iterationLog"></div>

    <h3>Final Result</h3>
    <div id="finalResult"></div>

    <script src="script.js"></script>
</body>
</html>
